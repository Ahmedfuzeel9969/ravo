# Auto-deploy backend to Render when RENDER_API_KEY and RENDER_SERVICE_ID are set in GitHub repo secrets.
# First-time setup: deploy Blueprint once via https://dashboard.render.com/blueprint/new?repo=https://github.com/Ahmedfuzeel9969/ravo
# Then copy the service ID from Render Dashboard → p2p-transport-api → Settings.

name: Deploy Render API

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
      - 'render.yaml'

jobs:
  deploy:
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Install Render CLI
        run: |
          curl -fsSL https://github.com/render-oss/cli/releases/download/v1.1.0/cli_1.1.0_linux_amd64.zip -o render.zip
          unzip render.zip
          sudo mv cli_v1.1.0 /usr/local/bin/render
      - name: Trigger deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          CI: true
        run: render deploys create ${{ secrets.RENDER_SERVICE_ID }} --output json --confirm --wait

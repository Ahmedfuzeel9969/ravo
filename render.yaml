# Render.com — P2P Transport Node.js API + WebSockets
# Repo: https://github.com/Ahmedfuzeel9969/ravo
# Dashboard: New Blueprint → connect repo → Deploy

services:
  - type: web
    name: p2p-transport-api
    runtime: node
    region: singapore
    plan: free
    repo: https://github.com/Ahmedfuzeel9969/ravo
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_ONLY
        value: "true"
      - key: STORAGE_BACKEND
        value: firestore
      - key: FIREBASE_PROJECT_ID
        value: ravo-44c4c
      - key: CORS_ORIGIN
        value: https://ravo-44c4c.web.app,https://ravo-44c4c.firebaseapp.com,http://localhost:3000,http://127.0.0.1:3000
    # Add FIREBASE_SERVICE_ACCOUNT_JSON as a secret in Render Dashboard (do not commit)
